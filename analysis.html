<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Financial Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <button onclick="window.close()" class="mb-4 text-red-600 border border-red-600 px-4 py-2 rounded">❌ ปิดหน้าต่างนี้</button>
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4 text-amber-600">วิเคราะห์เดือน พฤษภาคม 2569</h2>
        <button onclick="startAnalysis()" class="w-full bg-slate-800 text-white p-4 rounded-lg">✨ เริ่มการวิเคราะห์</button>
        <div id="result-box" class="mt-6 text-sm leading-relaxed hidden"></div>
    </div>

    <script>
        const SCRIPT_URL = "ใส่_URL_เว็บแอป_ของคุณที่นี่"; 

        async function startAnalysis() {
            const activeUser = localStorage.getItem('current_active_user');
            const myData = JSON.parse(localStorage.getItem('6jars_' + activeUser) || "[]");
            
            // กรองเดือนพฤษภาคม 2569 (เดือน 4)
            let filteredTx = myData.filter(t => {
                const d = new Date(t.isoDate);
                return d.getMonth() === 4 && d.getFullYear() === 2026;
            });

            // คำนวณยอดโหล (ใช้ LSS)
            let jars = { NEC: 0, PLAY: 0, FFA: 0, EDU: 0, LSS: 0, GIVE: 0 };
            filteredTx.forEach(t => { if(jars[t.jar_type] !== undefined) jars[t.jar_type] += t.amount; });

            let summaryData = { lss: jars.LSS, lss_percent: ((jars.LSS/10000)*100).toFixed(1) /*ปรับสูตรตามจริง*/ };

            // ส่งข้อมูลไป Apps Script
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'analyze', transactions: filteredTx, summary: summaryData, monthName: "พฤษภาคม 2569" })
            });
            const result = await res.json();
            document.getElementById('result-box').innerHTML = result.analysis.replace(/\n/g, '<br>');
            document.getElementById('result-box').classList.remove('hidden');
        }
    </script>
</body>
</html>
