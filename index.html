<!DOCTYPE html>
<html lang="th" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6 Jars Finance App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- [โค้ดส่วนหน้า UI บันทึกข้อมูลเดิมของคุณ ให้คงไว้ตามเดิม] -->
  <!-- ตรวจสอบให้แน่ใจว่าฟังก์ชัน login() มีบรรทัดนี้อยู่ด้านใน -->
  <script>
    function login() {
      const name = document.getElementById('loginInput').value.trim();
      if(!name) return;
      currentUser = name;
      localStorage.setItem('current_active_user', currentUser); // *** บรรทัดสำคัญ เพื่อให้หน้าวิเคราะห์รู้จักคุณ
      // ... (โค้ดที่เหลือเดิม) ...
    }
    
    // ตรงแถบเมนูด้านล่าง ปุ่มวิเคราะห์ให้ใช้ลิงก์นี้:
    // <a href="analysis.html" target="_blank">🧠 สรุปวิเคราะห์ AI</a>
  </script>
</body>
</html>
