<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial AI Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #FAFAFA;
            color: #333333;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-back {
            align-self: flex-start;
            background-color: transparent;
            color: #5A4A42;
            border: 1px solid #5A4A42;
            padding: 8px 16px;
            font-size: 14px;
            font-family: 'Prompt', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-back:hover {
            background-color: #5A4A42;
            color: #FFFFFF;
        }

        .header-title {
            color: #D4AF37; 
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-align: center;
        }

        .card {
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn-analyze {
            background-color: #5A4A42; 
            color: #FFFFFF;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Prompt', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(90, 74, 66, 0.2);
            width: 100%;
            max-width: 300px;
        }

        .btn-analyze:hover {
            background-color: #D4AF37;
        }

        .result-area {
            margin-top: 30px;
            text-align: left;
            line-height: 1.8;
            display: none;
            padding: 20px;
            background-color: #FDFBF7;
            border-left: 4px solid #D4AF37;
            border-radius: 4px;
        }

        #premium-loading-screen {
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cartoon-character {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .text-container {
            height: 40px; 
            margin-top: 10px;
        }

        #fading-text {
            font-size: 16px;
            color: #5A4A42;
            transition: opacity 1s ease-in-out;
            margin: 0;
        }

        .fade-in { opacity: 1; }
        .fade-out { opacity: 0; }

        .premium-spinner {
            margin-top: 20px;
            width: 35px;
            height: 35px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-top: 2px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button class="btn-back" onclick="goBackToJars()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        กลับไปหน้าหลัก
    </button>

    <h2 class="header-title">ระบบวิเคราะห์การเงินอัจฉริยะ</h2>

    <div class="card">
        <h3>สรุปผลประจำเดือนเชิงลึก</h3>
        <p style="color: #888; font-size: 14px; margin-bottom: 30px;">
            AI จะดึงประวัติการใช้จ่ายจริง เช่น ค่ากาแฟ ค่าอาหาร เพื่อนำมาวิเคราะห์และให้คำแนะนำแบบเฉพาะตัว
        </p>
        
        <button class="btn-analyze" id="btn-start" onclick="startAnalysis()">✨ เริ่มการวิเคราะห์ AI</button>

        <div class="result-area" id="result-box">
            <div id="ai-response"></div>
        </div>

        <div id="premium-loading-screen">
            <img src="https://cdn-icons-png.flaticon.com/512/10398/10398012.png" alt="AI Character" class="cartoon-character">
            
            <div class="text-container">
                <p id="fading-text" class="fade-in">กำลังดึงประวัติการใช้จ่ายของคุณ...</p>
            </div>
            
            <div class="premium-spinner"></div>
        </div>
    </div>

    <script>
        // *** อย่าลืมนำ URL ของ Web App อันใหม่ (ที่ Deploy เป็น New Version แล้ว) มาใส่ตรงนี้นะคะ ***
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz8vOOS8rq4K4iOaOEFCkej7ogbHsnFcvKBAofHl1v4c5nyQZ3HvM8zogHE-RFXdKah/exec";

        function goBackToJars() {
            // คำสั่งให้ลิงก์กลับไปที่หน้า index.html 
            window.location.href = 'index.html'; 
        }

        function startAnalysis() {
            const loadingScreen = document.getElementById('premium-loading-screen');
            const textElement = document.getElementById('fading-text');
            const resultBox = document.getElementById('result-box');
            const aiResponseDiv = document.getElementById('ai-response');
            const btnStart = document.getElementById('btn-start');

            const loadingTexts = [
                "กำลังดึงประวัติการใช้จ่ายของคุณ...",
                "วิเคราะห์แยกตามโหล 6 Jars...",
                "ประมวลผลเชิงลึกด้วย AI...",
                "เตรียมคำแนะนำแบบ NotebookLM..."
            ];
            
            let currentIndex = 0;
            
            resultBox.style.display = 'none';
            btnStart.style.display = 'none';
            loadingScreen.style.display = 'flex';
            
            const textInterval = setInterval(() => {
                textElement.classList.remove('fade-in');
                textElement.classList.add('fade-out');
                
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % loadingTexts.length;
                    textElement.innerText = loadingTexts[currentIndex];
                    textElement.classList.remove('fade-out');
                    textElement.classList.add('fade-in');
                }, 1000); 
            }, 3500);

            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
            })
            .then(response => response.json())
            .then(data => {
                clearInterval(textInterval);
                loadingScreen.style.display = 'none';
                btnStart.style.display = 'inline-block';
                btnStart.innerText = '🔄 วิเคราะห์ใหม่อีกครั้ง';
                
                if(data.status === "success") {
                    const formattedText = data.data.replace(/\n/g, '<br>');
                    aiResponseDiv.innerHTML = `<strong>ผลการวิเคราะห์:</strong><br><br>${formattedText}`;
                } else {
                    aiResponseDiv.innerHTML = `<span style="color: red;">เกิดข้อผิดพลาด: ${data.message}</span>`;
                }
                
                resultBox.style.display = 'block';
            })
            .catch(error => {
                clearInterval(textInterval);
                loadingScreen.style.display = 'none';
                btnStart.style.display = 'inline-block';
                
                aiResponseDiv.innerHTML = `<span style="color: red;">ไม่สามารถเชื่อมต่อระบบได้: ${error}</span>`;
                resultBox.style.display = 'block';
            });
        }
    </script>
</body>
</html>
