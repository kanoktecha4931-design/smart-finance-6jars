<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE RICH ONLINE - Financial AI Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* สไตล์หลักแบบ Luxury Modern Zen */
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #FAFAFA; /* ขาวอมเทาให้ความรู้สึกคลีน */
            color: #333333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title {
            color: #D4AF37; /* สีทองแชมเปญ */
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        .card {
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .btn-analyze {
            background-color: #5A4A42; /* สีน้ำตาลเข้มดูพรีเมียม */
            color: #FFFFFF;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-family: 'Prompt', sans-serif;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 15px rgba(90, 74, 66, 0.2);
        }

        .btn-analyze:hover {
            background-color: #D4AF37; /* เปลี่ยนเป็นสีทองเมื่อเอาเมาส์ชี้ */
        }

        .result-area {
            margin-top: 30px;
            text-align: left;
            line-height: 1.8;
            display: none;
            padding: 20px;
            background-color: #FDFBF7;
            border-left: 4px solid #D4AF37;
            border-radius: 4px;
        }

        /* ------------------------------------------- */
        /* ส่วนของ Loading State แบบพรีเมียม */
        /* ------------------------------------------- */
        #premium-loading-screen {
            position: absolute; /* ซ้อนทับบน Card */
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .cartoon-character {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .text-container {
            height: 40px; 
            margin-top: 10px;
        }

        #fading-text {
            font-size: 16px;
            color: #5A4A42;
            transition: opacity 1s ease-in-out;
            margin: 0;
        }

        .fade-in { opacity: 1; }
        .fade-out { opacity: 0; }

        .premium-spinner {
            margin-top: 20px;
            width: 35px;
            height: 35px;
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-top: 2px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h2 class="header-title">THE RICH ONLINE</h2>

    <div class="card">
        <h3>การวิเคราะห์การเงินรายเดือน</h3>
        <p style="color: #888; font-size: 14px; margin-bottom: 30px;">
            ระบบจะดึงข้อมูลปัจจุบันและเปรียบเทียบกับเดือนที่ผ่านมาเพื่อประมวลผลด้วย AI
        </p>
        
        <button class="btn-analyze" id="btn-start" onclick="startAnalysis()">✨ สรุปวิเคราะห์ AI</button>

        <div class="result-area" id="result-box">
            <div id="ai-response"></div>
        </div>

        <div id="premium-loading-screen">
            <img src="https://cdn-icons-png.flaticon.com/512/10398/10398012.png" alt="AI Character" class="cartoon-character">
            
            <div class="text-container">
                <p id="fading-text" class="fade-in">กำลังรวบรวมข้อมูลการเงินของคุณ...</p>
            </div>
            
            <div class="premium-spinner"></div>
        </div>
    </div>

    <script>
        // *** สำคัญ: นำ URL ของ Web App ที่ได้จาก Google Apps Script มาใส่ตรงนี้ ***
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz8vOOS8rq4K4iOaOEFCkej7ogbHsnFcvKBAofHl1v4c5nyQZ3HvM8zogHE-RFXdKah/exec";

        function startAnalysis() {
            const loadingScreen = document.getElementById('premium-loading-screen');
            const textElement = document.getElementById('fading-text');
            const resultBox = document.getElementById('result-box');
            const aiResponseDiv = document.getElementById('ai-response');
            const btnStart = document.getElementById('btn-start');

            const loadingTexts = [
                "กำลังรวบรวมข้อมูลการเงินของคุณ...",
                "วิเคราะห์แนวโน้มกับเดือนที่ผ่านมา...",
                "ประมวลผลเชิงลึกด้วย AI...",
                "เตรียมสรุปแผนเพื่อความมั่งคั่ง..."
            ];
            
            let currentIndex = 0;
            
            // ซ่อนผลลัพธ์เดิมและปุ่มกด แล้วแสดงหน้าต่างโหลด
            resultBox.style.display = 'none';
            btnStart.style.display = 'none';
            loadingScreen.style.display = 'flex';
            
            // เริ่มต้นแอนิเมชันข้อความเฟด
            const textInterval = setInterval(() => {
                textElement.classList.remove('fade-in');
                textElement.classList.add('fade-out');
                
                setTimeout(() => {
                    currentIndex = (currentIndex + 1) % loadingTexts.length;
                    textElement.innerText = loadingTexts[currentIndex];
                    textElement.classList.remove('fade-out');
                    textElement.classList.add('fade-in');
                }, 1000); 
            }, 3500);

            // เริ่มส่งคำสั่งไปที่ Google Apps Script (ยิง API)
            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
            })
            .then(response => response.json())
            .then(data => {
                // หยุดแอนิเมชัน
                clearInterval(textInterval);
                loadingScreen.style.display = 'none';
                btnStart.style.display = 'inline-block'; // นำปุ่มกลับมาเผื่อกดใหม่
                
                // นำผลลัพธ์จาก AI มาแสดง
                if(data.status === "success") {
                    // แปลง \n เป็นแท็ก <br> ของ HTML เพื่อขึ้นบรรทัดใหม่ให้สวยงาม
                    const formattedText = data.data.replace(/\n/g, '<br>');
                    aiResponseDiv.innerHTML = `<strong>ผลการวิเคราะห์:</strong><br><br>${formattedText}`;
                } else {
                    aiResponseDiv.innerHTML = `<span style="color: red;">เกิดข้อผิดพลาด: ${data.message}</span>`;
                }
                
                // แสดงกล่องผลลัพธ์
                resultBox.style.display = 'block';
            })
            .catch(error => {
                clearInterval(textInterval);
                loadingScreen.style.display = 'none';
                btnStart.style.display = 'inline-block';
                
                aiResponseDiv.innerHTML = `<span style="color: red;">ไม่สามารถเชื่อมต่อระบบได้: ${error}</span>`;
                resultBox.style.display = 'block';
            });
        }
    </script>
</body>
</html>
